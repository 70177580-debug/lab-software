<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malik Surgical Hospital - Lab Report System</title>
<style>
  /* ── GLOBAL ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #222; }

  /* ── NAVBAR ── */
  .navbar {
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    color: #fff; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .navbar h1 { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .navbar h1 span { color: #aed6f1; font-weight: 400; font-size: 12px; display: block; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    background: transparent; border: none; color: rgba(255,255,255,.75);
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .2s;
  }
  .nav-tab:hover { background: rgba(255,255,255,.15); color: #fff; }
  .nav-tab.active { background: rgba(255,255,255,.22); color: #fff; }

  /* ── PAGES ── */
  .page { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: #fff; border-radius: 10px; padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 20px;
  }
  .card h2 {
    font-size: 15px; font-weight: 700; color: #1a5276;
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 2px solid #d6eaf8;
  }

  /* ── FORM GRID ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .4px; }
  .form-group input, .form-group select, .form-group textarea {
    border: 1.5px solid #d0d9e4; border-radius: 7px; padding: 9px 12px;
    font-size: 14px; color: #222; transition: border .2s;
    background: #fafcff;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: #2e86c1; background: #fff;
  }
  .full-width { grid-column: 1 / -1; }

  /* ── BUTTONS ── */
  .btn {
    padding: 10px 22px; border: none; border-radius: 7px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary { background: #1a5276; color: #fff; }
  .btn-primary:hover { background: #154360; }
  .btn-success { background: #1e8449; color: #fff; }
  .btn-success:hover { background: #196f3d; }
  .btn-warning { background: #d68910; color: #fff; }
  .btn-warning:hover { background: #b7770d; }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #a93226; }
  .btn-whatsapp { background: #25d366; color: #fff; }
  .btn-whatsapp:hover { background: #128c7e; }
  .btn-outline {
    background: transparent; border: 2px solid #1a5276; color: #1a5276;
  }
  .btn-outline:hover { background: #1a5276; color: #fff; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  /* ── TEST SELECTION ── */
  .dept-section { margin-bottom: 18px; }
  .dept-title {
    background: #1a5276; color: #fff; padding: 8px 14px;
    border-radius: 6px; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; user-select: none;
  }
  .dept-title:hover { background: #154360; }
  .dept-body { display: none; padding: 12px 0 4px; }
  .dept-body.open { display: block; }
  .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .test-check {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border: 1.5px solid #d0d9e4; border-radius: 6px; cursor: pointer;
    transition: all .15s; background: #fafcff; font-size: 13px;
  }
  .test-check:hover { border-color: #2e86c1; background: #ebf5fb; }
  .test-check input[type=checkbox] { width: 16px; height: 16px; accent-color: #1a5276; cursor: pointer; }
  .test-check.selected { border-color: #1a5276; background: #d6eaf8; font-weight: 600; }

  /* ── RESULT ENTRY ── */
  .result-section { margin-bottom: 16px; }
  .result-section-title {
    background: #e67e22; color: #fff;
    padding: 7px 14px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    border-radius: 5px 5px 0 0;
  }
  .result-table { width: 100%; border-collapse: collapse; }
  .result-table th {
    background: #fef9f0; font-size: 12px; font-weight: 700;
    color: #555; text-align: left; padding: 8px 10px;
    border-bottom: 1.5px solid #f0d9b8;
  }
  .result-table td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .result-table tr:last-child td { border-bottom: none; }
  .param-name { font-size: 13px; font-weight: 500; color: #333; }
  .param-range { font-size: 11px; color: #777; }
  .param-unit { font-size: 12px; color: #555; }
  .result-input {
    width: 100%; border: 1.5px solid #d0d9e4; border-radius: 5px;
    padding: 6px 8px; font-size: 13px; min-width: 100px;
  }
  .result-input:focus { outline: none; border-color: #2e86c1; }
  .flag-select {
    border: 1.5px solid #d0d9e4; border-radius: 5px;
    padding: 5px 6px; font-size: 12px; background: #fafcff;
  }
  .flag-select:focus { outline: none; border-color: #2e86c1; }

  /* ── REPORTS LIST ── */
  .report-card {
    background: #fff; border-radius: 8px; padding: 16px 20px;
    border-left: 4px solid #1a5276; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
  }
  .report-info h3 { font-size: 15px; font-weight: 700; color: #1a5276; }
  .report-info p { font-size: 12px; color: #666; margin-top: 3px; }
  .badge {
    font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600;
  }
  .badge-ready { background: #d5f5e3; color: #1e8449; }
  .badge-pending { background: #fdebd0; color: #d68910; }
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
  }
  .search-bar input {
    flex: 1; border: 1.5px solid #d0d9e4; border-radius: 7px;
    padding: 9px 14px; font-size: 14px;
  }
  .search-bar input:focus { outline: none; border-color: #2e86c1; }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-box {
    background: #fff; border-radius: 10px; padding: 18px;
    text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }
  .stat-num { font-size: 32px; font-weight: 800; color: #1a5276; }
  .stat-label { font-size: 12px; color: #666; margin-top: 4px; }

  /* ── PRINT STYLES ── */
  @media print {
    body * { visibility: hidden !important; }
    #print-area, #print-area * { visibility: visible !important; }
    #print-area {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: auto !important;
    }
    .no-print { display: none !important; }
  }

  /* ── PRINT REPORT LAYOUT ── */
  #print-area {
    display: none;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #000;
    background: #fff;
    padding: 0;
  }
  .rpt-page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 10mm 12mm;
    background: #fff;
  }
  /* Header */
  .rpt-header {
    display: flex; align-items: center;
    border-bottom: 3px solid #1a5276; padding-bottom: 8px; margin-bottom: 8px;
  }
  .rpt-logo { width: 70px; height: 70px; object-fit: contain; margin-right: 12px; }
  .rpt-hosp-name {
    font-size: 22px; font-weight: 900; color: #1a5276; line-height: 1.1;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .rpt-hosp-sub {
    font-size: 11px; font-weight: 700; color: #e67e22;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .rpt-hosp-addr { font-size: 10px; color: #555; margin-top: 3px; }
  .rpt-header-right { margin-left: auto; text-align: right; }
  .rpt-header-right .lab-no {
    font-size: 18px; font-weight: 800; color: #1a5276;
  }
  .rpt-header-right small { font-size: 10px; color: #666; display: block; }
  /* Patient info */
  .rpt-patient {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2px 20px; background: #eaf4fb;
    border: 1px solid #aed6f1; border-radius: 5px;
    padding: 8px 12px; margin-bottom: 8px; font-size: 11px;
  }
  .rpt-patient-row { display: flex; gap: 5px; }
  .rpt-patient-row .lbl { font-weight: 700; min-width: 90px; color: #333; }
  .rpt-patient-row .val { color: #000; }
  /* Report title */
  .rpt-title {
    background: #1a5276; color: #fff; text-align: center;
    padding: 6px; font-size: 13px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px; border-radius: 3px;
  }
  /* Test table */
  .rpt-test-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .rpt-test-table th {
    background: #d6eaf8; color: #1a5276;
    font-size: 11px; font-weight: 800;
    padding: 5px 7px; text-align: left;
    border: 1px solid #aed6f1;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .rpt-test-table td {
    padding: 4px 7px; border: 1px solid #e8e8e8;
    font-size: 11px; vertical-align: top;
  }
  .rpt-dept-row td {
    background: #e67e22; color: #fff;
    font-weight: 800; font-size: 11px;
    padding: 4px 7px; text-transform: uppercase;
    letter-spacing: .5px;
  }
  .rpt-result-high { color: #c0392b; font-weight: 700; }
  .rpt-result-low { color: #1a5276; font-weight: 700; }
  .rpt-result-normal { color: #000; }
  /* Footer */
  .rpt-footer {
    border-top: 2px solid #1a5276; margin-top: 10px; padding-top: 8px;
    display: flex; justify-content: space-between; align-items: flex-end;
    font-size: 10px; color: #555;
  }
  .rpt-footer .sig-line { border-top: 1px solid #333; width: 120px; text-align: center; padding-top: 3px; margin-top: 20px; }
  .rpt-disclaimer {
    text-align: center; font-size: 9px; color: #888; margin-top: 6px;
    font-style: italic;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 28px;
    max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 18px; color: #1a5276; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

  .empty-state { text-align: center; padding: 50px 20px; color: #888; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }
</style>
</head>
<body>

<nav class="navbar">
  <h1>🏥 Malik Surgical Hospital <span>Laboratory & Diagnostic Center</span></h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">📊 Dashboard</button>
    <button class="nav-tab" onclick="showPage('new-report')">➕ New Report</button>
    <button class="nav-tab" onclick="showPage('reports')">📋 Reports</button>
    <button class="nav-tab" onclick="showPage('settings')">⚙️ Settings</button>
  </div>
</nav>

<!-- ═══════════════ DASHBOARD ═══════════════ -->
<div id="page-dashboard" class="page active">
  <div id="stats-row" class="stats-grid"></div>
  <div class="card">
    <h2>📋 Recent Reports</h2>
    <div id="recent-list"></div>
  </div>
</div>

<!-- ═══════════════ NEW REPORT ═══════════════ -->
<div id="page-new-report" class="page">

  <!-- STEP 1: Patient Info -->
  <div id="step1" class="card">
    <h2>Step 1 — Patient Information</h2>
    <div class="form-grid three">
      <div class="form-group">
        <label>Patient Name *</label>
        <input id="pt-name" type="text" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input id="pt-age" type="text" placeholder="e.g. 35 years / 6 months">
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="pt-gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Telephone</label>
        <input id="pt-phone" type="text" placeholder="0300-0000000">
      </div>
      <div class="form-group">
        <label>Consultant / Doctor</label>
        <input id="pt-consultant" type="text" placeholder="Dr. Name / Self">
      </div>
      <div class="form-group">
        <label>Specimen / Sample Type</label>
        <select id="pt-specimen">
          <option value="Blood">Blood</option>
          <option value="Urine">Urine</option>
          <option value="Stool">Stool</option>
          <option value="Semen">Semen</option>
          <option value="Sputum">Sputum</option>
          <option value="Blood + Urine">Blood + Urine</option>
          <option value="Blood + Urine + Stool">Blood + Urine + Stool</option>
          <option value="Multiple">Multiple</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sample Collection Date</label>
        <input id="pt-collect-date" type="date">
      </div>
      <div class="form-group">
        <label>Report Date</label>
        <input id="pt-report-date" type="date">
      </div>
      <div class="form-group">
        <label>Address (optional)</label>
        <input id="pt-address" type="text" placeholder="Village / City">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="goToStep2()">Next: Select Tests →</button>
    </div>
  </div>

  <!-- STEP 2: Test Selection -->
  <div id="step2" class="card" style="display:none">
    <h2>Step 2 — Select Tests</h2>
    <div style="margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="expandAll()">Expand All</button>
      <button class="btn btn-outline" onclick="collapseAll()">Collapse All</button>
      <button class="btn btn-outline" onclick="quickSelect('preop')">Pre-Op Baseline</button>
      <button class="btn btn-outline" onclick="quickSelect('csec')">C-Section Panel</button>
      <button class="btn btn-outline" onclick="quickSelect('screening')">Screening Panel</button>
    </div>
    <div id="test-selection-area"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goToStep1()">← Back</button>
      <button class="btn btn-primary" onclick="goToStep3()">Next: Enter Results →</button>
    </div>
  </div>

  <!-- STEP 3: Enter Results -->
  <div id="step3" class="card" style="display:none">
    <h2>Step 3 — Enter Test Results</h2>
    <div id="result-entry-area"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goToStep2()">← Back</button>
      <button class="btn btn-success" onclick="saveReport()">💾 Save Report</button>
    </div>
  </div>

</div>

<!-- ═══════════════ REPORTS ═══════════════ -->
<div id="page-reports" class="page">
  <div class="card">
    <h2>📋 All Reports</h2>
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Search by name, phone or report no..." oninput="renderReportsList()">
    </div>
    <div id="reports-list"></div>
  </div>
</div>

<!-- ═══════════════ SETTINGS ═══════════════ -->
<div id="page-settings" class="page">
  <div class="card">
    <h2>⚙️ Hospital Settings</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Hospital Name</label>
        <input id="set-hosp-name" type="text" value="MALIK SURGICAL HOSPITAL">
      </div>
      <div class="form-group">
        <label>Department Name</label>
        <input id="set-dept-name" type="text" value="LABORATOR & DIAGNOSTIC CENTER">
      </div>
      <div class="form-group full-width">
        <label>Address</label>
        <input id="set-address" type="text" value="Hujra Baseerpur road Mandi Ahmad Abad-Depalpur Okara">
      </div>
      <div class="form-group">
        <label>Telephone</label>
        <input id="set-tel" type="text" value="044-4840463">
      </div>
      <div class="form-group">
        <label>Pathologist / In-charge Name</label>
        <input id="set-pathologist" type="text" value="For Lab">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="saveSettings()">💾 Save Settings</button>
    </div>
  </div>
  <div class="card">
    <h2>🗑️ Data Management</h2>
    <p style="font-size:13px;color:#666;margin-bottom:14px;">Clear all reports (cannot be undone). Settings are preserved.</p>
    <button class="btn btn-danger" onclick="clearAllReports()">🗑️ Clear All Reports</button>
  </div>
</div>

<!-- ═══════════════ PRINT AREA ═══════════════ -->
<div id="print-area"></div>

<!-- ═══════════════ VIEW MODAL ═══════════════ -->
<div id="view-modal" class="modal-overlay">
  <div class="modal" style="max-width:700px;width:95%">
    <h2>Report Preview</h2>
    <div id="modal-report-content"></div>
    <div class="modal-actions no-print">
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-whatsapp" id="whatsapp-btn">📱 Share on WhatsApp</button>
      <button class="btn btn-primary" onclick="printCurrentReport()">🖨️ Print</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  DATA — Tests Master List
// ═══════════════════════════════════════════
const TESTS = {
  "Hematology": [
    { id:"hb",    name:"Hemoglobin (Hb)",    unit:"g/dL",       range:"M:13.5-17.5 | F:12.0-15.5", dept:"CBC" },
    { id:"rbc",   name:"RBC Count",           unit:"million/µL", range:"M:4.5-5.9 | F:4.0-5.2",    dept:"CBC" },
    { id:"hct",   name:"Hematocrit (HCT/PCV)",unit:"%",          range:"M:41-53 | F:36-46",         dept:"CBC" },
    { id:"mcv",   name:"MCV",                 unit:"fL",         range:"80-100",                     dept:"CBC" },
    { id:"mch",   name:"MCH",                 unit:"pg",         range:"27-33",                      dept:"CBC" },
    { id:"mchc",  name:"MCHC",                unit:"g/dL",       range:"32-36",                      dept:"CBC" },
    { id:"wbc",   name:"WBC Count (TLC)",      unit:"/µL",        range:"4,000-11,000",               dept:"CBC" },
    { id:"neut",  name:"Neutrophils",          unit:"%",          range:"40-75",                      dept:"CBC - Differential" },
    { id:"lymp",  name:"Lymphocytes",          unit:"%",          range:"20-45",                      dept:"CBC - Differential" },
    { id:"mono",  name:"Monocytes",            unit:"%",          range:"2-10",                       dept:"CBC - Differential" },
    { id:"eosi",  name:"Eosinophils",          unit:"%",          range:"1-6",                        dept:"CBC - Differential" },
    { id:"baso",  name:"Basophils",            unit:"%",          range:"0-1",                        dept:"CBC - Differential" },
    { id:"plt",   name:"Platelet Count",       unit:"/µL",        range:"150,000-450,000",            dept:"CBC" },
    { id:"esr",   name:"ESR",                  unit:"mm/hr",      range:"M:0-15 | F:0-20",           dept:"CBC" },
    { id:"bt",    name:"Bleeding Time (BT)",   unit:"min",        range:"1-3",                        dept:"Coagulation" },
    { id:"ct",    name:"Clotting Time (CT)",   unit:"min",        range:"3-6",                        dept:"Coagulation" },
    { id:"pt",    name:"Prothrombin Time (PT)",unit:"sec",        range:"11-13.5",                    dept:"Coagulation" },
    { id:"inr",   name:"INR",                  unit:"ratio",      range:"0.8-1.1",                    dept:"Coagulation" },
    { id:"aptt",  name:"APTT",                 unit:"sec",        range:"25-35",                      dept:"Coagulation" },
    { id:"bg",    name:"Blood Group (ABO+Rh)", unit:"—",          range:"A/B/AB/O ±Rh",               dept:"Blood Group" },
    { id:"pbf",   name:"Peripheral Blood Film",unit:"—",          range:"Normal morphology",          dept:"Hematology" },
  ],
  "Biochemistry": [
    { id:"fbs",   name:"Fasting Blood Sugar",  unit:"mg/dL",      range:"70-100",                     dept:"Glucose" },
    { id:"rbs",   name:"Random Blood Sugar",   unit:"mg/dL",      range:"<140",                       dept:"Glucose" },
    { id:"hba1c", name:"HbA1c",                unit:"%",          range:"<5.7 normal",                dept:"Glucose" },
    { id:"tbili", name:"Total Bilirubin",       unit:"mg/dL",      range:"0.3-1.2",                    dept:"LFTs" },
    { id:"dbili", name:"Direct Bilirubin",      unit:"mg/dL",      range:"0.0-0.3",                    dept:"LFTs" },

function getReports() { try { return JSON.parse(localStorage.getItem('msh_reports') || '[]'); } catch(e) { return []; } }
function saveReports(r) { localStorage.setItem('msh_reports', JSON.stringify(r)); }
function getSettings() {
  const def = {
    hospName: "MALIK SURGICAL HOSPITAL",
    deptName: "LABORATOR & DIAGNOSTIC CENTER",
    address: "Hujra Baseerpur road Mandi Ahmad Abad-Depalpur Okara",
    tel: "044-4840463",
    pathologist: "For Lab",
  };
  try { return Object.assign(def, JSON.parse(localStorage.getItem('msh_settings') || '{}')); } catch(e) { return def; }
}
function padNum(n,len=4) { return String(n).padStart(len,'0'); }
function nextLabNo() {
  const r = getReports();
  const year = new Date().getFullYear();
  const nos = r.filter(x=>x.labNo&&x.labNo.startsWith(String(year))).map(x=>parseInt(x.labNo.split('-')[1]||0));
  const max = nos.length ? Math.max(...nos) : 0;
  return `${year}-${padNum(max+1)}`;
}
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)}-${months[parseInt(m)-1]}-${y}`;
}
function getAllTests() {
  const all = [];
  for(const dept in TESTS) TESTS[dept].forEach(t => all.push({...t, category: dept}));
  return all;
}
function getTestById(id) {
  return getAllTests().find(t=>t.id===id);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  const map = {dashboard:0,'new-report':1,reports:2,settings:3};
  tabs[map[name]].classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='reports') renderReportsList();
  if(name==='settings') loadSettings();
  if(name==='new-report') initNewReport();
}

function renderDashboard() {
  const reports = getReports();
  const today_str = today();
  const todayRep = reports.filter(r=>r.savedAt&&r.savedAt.slice(0,10)===today_str);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="stat-num">${reports.length}</div><div class="stat-label">Total Reports</div></div>
    <div class="stat-box"><div class="stat-num">${todayRep.length}</div><div class="stat-label">Today's Reports</div></div>
    <div class="stat-box"><div class="stat-num">${reports.filter(r=>r.status==='ready').length}</div><div class="stat-label">Ready</div></div>
    <div class="stat-box"><div class="stat-num">${reports.filter(r=>r.status==='pending').length}</div><div class="stat-label">Pending</div></div>
  `;
  const recent = [...reports].reverse().slice(0,5);
  if(!recent.length) {
    document.getElementById('recent-list').innerHTML = `<div class="empty-state"><div class="icon">🧪</div><p>No reports yet. Create your first report.</p></div>`;
    return;
  }
  document.getElementById('recent-list').innerHTML = recent.map(r=>reportCard(r)).join('');
}

function reportCard(r) {
  return `<div class="report-card">
    <div class="report-info">
      <h3>${r.patient?.name||'Unknown'} &nbsp;<small style="font-weight:400;color:#888">Lab No: ${r.labNo}</small></h3>
      <p>Age: ${r.patient?.age||'—'} | ${r.patient?.gender||'—'} | Date: ${fmtDate(r.patient?.reportDate)} | Tests: ${(r.selectedTests||[]).length}</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="badge ${r.status==='ready'?'badge-ready':'badge-pending'}">${r.status==='ready'?'✅ Ready':'⏳ Pending'}</span>
      <button class="btn btn-primary" style="padding:7px 14px;font-size:12px" onclick="viewReport('${r.id}')">👁 View</button>
      <button class="btn btn-danger" style="padding:7px 14px;font-size:12px" onclick="deleteReport('${r.id}')">🗑</button>
    </div>
  </div>`;
}

function goToStep2() {

function renderTestSelection() {
  let html = '';
  for(const dept in TESTS) {
    html += `<div class="dept-section">
      <div class="dept-title" onclick="toggleDept('dept-${dept.replace(/\W/g,'_')}')">
        ${dept} <span id="sel-count-${dept.replace(/\W/g,'_')}"></span> ▼
      </div>
      <div class="dept-body" id="dept-${dept.replace(/\W/g,'_')}">
        <div class="test-grid">`;
    TESTS[dept].forEach(t => {
      const sel = selectedTests.has(t.id);
      html += `<label class="test-check ${sel?'selected':''}" id="lbl-${t.id}">
        <input type="checkbox" ${sel?'checked':''} onchange="toggleTest('${t.id}',this)" />
        ${t.name}
      </label>`;
    });
    html += `</div></div></div>`;
  }
  document.getElementById('test-selection-area').innerHTML = html;
  updateSelCounts();
}

function toggleDept(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}
function expandAll() { document.querySelectorAll('.dept-body').forEach(d=>d.classList.add('open')); }
function collapseAll() { document.querySelectorAll('.dept-body').forEach(d=>d.classList.remove('open')); }

function toggleTest(id, cb) {
  if(cb.checked) selectedTests.add(id);
  else selectedTests.delete(id);
  const lbl = document.getElementById('lbl-'+id);
  if(lbl) lbl.classList.toggle('selected', cb.checked);
  updateSelCounts();
}

function updateSelCounts() {
  for(const dept in TESTS) {
    const key = dept.replace(/\W/g,'_');
    const count = TESTS[dept].filter(t=>selectedTests.has(t.id)).length;
    const el = document.getElementById('sel-count-'+key);
    if(el) el.textContent = count > 0 ? `(${count} selected)` : '';
  }
}

function quickSelect(panel) {
  const ids = QUICK_PANELS[panel] || [];
  ids.forEach(id => {
    selectedTests.add(id);
    const cb = document.querySelector(`input[onchange*="'${id}'"]`);
    if(cb) { cb.checked = true; const lbl = document.getElementById('lbl-'+id); if(lbl) lbl.classList.add('selected'); }
  });
  updateSelCounts();
}

function goToStep3() {
  if(selectedTests.size === 0) { alert('Please select at least one test.'); return; }
  currentReport.selectedTests = [...selectedTests];
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = '';
  renderResultEntry();
}

function renderResultEntry() {
  // Group selected tests by dept
  const byDept = {};
  currentReport.selectedTests.forEach(id => {
    const t = getTestById(id);
    if(!t) return;
    const dept = t.dept || t.category;
    if(!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(t);
  });

  let html = '';
  for(const dept in byDept) {
    html += `<div class="result-section">
      <div class="result-section-title">${dept}</div>
      <table class="result-table">
        <thead><tr>
          <th style="width:35%">Test</th>
          <th style="width:25%">Normal Range</th>
          <th style="width:10%">Unit</th>
          <th style="width:20%">Result</th>
          <th style="width:10%">Flag</th>
        </tr></thead>
        <tbody>`;
    byDept[dept].forEach(t => {
      const prev = (currentReport.results||{})[t.id] || {};
      html += `<tr>
        <td><div class="param-name">${t.name}</div></td>
        <td><div class="param-range">${t.range}</div></td>
        <td><div class="param-unit">${t.unit}</div></td>
        <td><input class="result-input" id="res-${t.id}" type="text" value="${prev.value||''}" placeholder="Enter result"></td>
        <td>
          <select class="flag-select" id="flag-${t.id}">
            <option value="normal" ${(prev.flag||'normal')==='normal'?'selected':''}>Normal</option>
            <option value="high" ${prev.flag==='high'?'selected':''}>↑ High</option>
            <option value="low" ${prev.flag==='low'?'selected':''}>↓ Low</option>
            <option value="positive" ${prev.flag==='positive'?'selected':''}>Positive</option>
            <option value="reactive" ${prev.flag==='reactive'?'selected':''}>Reactive</option>
          </select>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  document.getElementById('result-entry-area').innerHTML = html;
}

function saveReport() {
  // Collect results
  const results = {};
  currentReport.selectedTests.forEach(id => {
    const valEl = document.getElementById('res-'+id);
    const flagEl = document.getElementById('flag-'+id);
    results[id] = {
      value: valEl ? valEl.value.trim() : '',
      flag: flagEl ? flagEl.value : 'normal',
    };
  });
  currentReport.results = results;

  const reports = getReports();
  const id = currentReportId || 'rpt-' + Date.now();
  const labNo = currentReportId ? (reports.find(r=>r.id===id)||{}).labNo : nextLabNo();
  const report = {
    id, labNo,
    patient: currentReport.patient,
    selectedTests: currentReport.selectedTests,
    results,
    status: 'ready',
    savedAt: new Date().toISOString(),
  };

  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0) reports[idx] = report;
  else reports.push(report);
  saveReports(reports);
  alert(`✅ Report saved! Lab No: ${labNo}`);
  showPage('reports');
}

// ═══════════════════════════════════════════
//  REPORTS LIST
// ═══════════════════════════════════════════
function renderReportsList() {
  const q = (document.getElementById('search-input')||{}).value || '';
  const reports = getReports().filter(r =>
    !q ||
    (r.patient?.name||'').toLowerCase().includes(q.toLowerCase()) ||
    (r.patient?.phone||'').includes(q) ||
    (r.labNo||'').includes(q)
  ).reverse();

  if(!reports.length) {
    document.getElementById('reports-list').innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>${q?'No reports matching search.':'No reports yet.'}</p></div>`;
    return;
  }
  document.getElementById('reports-list').innerHTML = reports.map(r=>reportCard(r)).join('');
}

function deleteReport(id) {
  if(!confirm('Delete this report?')) return;
  saveReports(getReports().filter(r=>r.id!==id));
  renderReportsList();
  renderDashboard();
}

// ═══════════════════════════════════════════
//  VIEW REPORT
// ═══════════════════════════════════════════
let _currentViewReport = null;

function viewReport(id) {
  const report = getReports().find(r=>r.id===id);
  if(!report) return;
  _currentViewReport = report;
  const html = buildReportHTML(report);
  document.getElementById('modal-report-content').innerHTML = `<div style="max-height:60vh;overflow-y:auto;border:1px solid #ddd;border-radius:6px;padding:12px">${html}</div>`;

  // WhatsApp share
  const s = getSettings();
  const msg = `*${s.hospName}*\n*Lab Report*\nPatient: ${report.patient?.name}\nLab No: ${report.labNo}\nDate: ${fmtDate(report.patient?.reportDate)}\n\n_Please collect your report from lab or visit our system._\n📞 ${s.tel}`;
  document.getElementById('whatsapp-btn').onclick = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  };

  document.getElementById('view-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('view-modal').classList.remove('open');
}

function printCurrentReport() {
  if(!_currentViewReport) return;
  const html = buildReportHTML(_currentViewReport);
  document.getElementById('print-area').innerHTML = `<div class="rpt-page">${html}</div>`;
  document.getElementById('print-area').style.display = 'block';
  setTimeout(() => { window.print(); document.getElementById('print-area').style.display = 'none'; }, 300);
}

function buildReportHTML(report) {
  const s = getSettings();
  const p = report.patient || {};

  // Group tests by dept
  const byDept = {};
  (report.selectedTests||[]).forEach(id => {
    const t = getTestById(id);
    if(!t) return;
    const dept = t.dept || t.category;
    if(!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(t);
  });

  let tableRows = '';
  for(const dept in byDept) {
    tableRows += `<tr class="rpt-dept-row"><td colspan="4">⬛ ${dept}</td></tr>`;
    byDept[dept].forEach(t => {
      const res = (report.results||{})[t.id] || {};
      const val = res.value || '—';
      const flag = res.flag || 'normal';
      let valClass = 'rpt-result-normal';
      let flagStr = '';
      if(flag==='high') { valClass='rpt-result-high'; flagStr=' ↑'; }
      if(flag==='low') { valClass='rpt-result-low'; flagStr=' ↓'; }
      if(flag==='positive'||flag==='reactive') { valClass='rpt-result-high'; flagStr=' ⚠'; }
      tableRows += `<tr>
        <td style="width:38%">${t.name}</td>
        <td style="width:27%">${t.range}</td>
        <td style="width:10%">${t.unit}</td>
        <td style="width:25%" class="${valClass}"><strong>${val}${flagStr}</strong></td>
      </tr>`;
    });
  }

  return `
    <div class="rpt-header">
      <img class="rpt-logo" src="data:image/png;base64,${LOGO_B64}" alt="Logo" onerror="this.style.display='none'">
      <div>
        <div class="rpt-hosp-name">${s.hospName}</div>
        <div class="rpt-hosp-sub">${s.deptName}</div>
        <div class="rpt-hosp-addr">📍 ${s.address} &nbsp;📞 ${s.tel}</div>
      </div>
      <div class="rpt-header-right">
        <div class="lab-no">Lab No: ${report.labNo}</div>
        <small>Receipt Date: ${fmtDate(p.collectDate)}</small>
        <small>Report Date: ${fmtDate(p.reportDate)}</small>
        <small>Specimen: ${p.specimen||'Blood'}</small>
      </div>
    </div>

    <div class="rpt-patient">
      <div class="rpt-patient-row"><span class="lbl">Patient Name:</span><span class="val">${p.name||'—'}</span></div>
      <div class="rpt-patient-row"><span class="lbl">Consultant:</span><span class="val">${p.consultant||'Self'}</span></div>
      <div class="rpt-patient-row"><span class="lbl">Sex:</span><span class="val">${p.gender||'—'}</span></div>
      <div class="rpt-patient-row"><span class="lbl">Address:</span><span class="val">${p.address||'—'}</span></div>
      <div class="rpt-patient-row"><span class="lbl">Age:</span><span class="val">${p.age||'—'}</span></div>
      <div class="rpt-patient-row"><span class="lbl">Telephone:</span><span class="val">${p.phone||'—'}</span></div>
    </div>

    <table class="rpt-test-table">
      <thead>
        <tr>
          <th>Tests</th>
          <th>Normal Range</th>
          <th>Unit</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>

    <div class="rpt-footer">
      <div>
        <div class="rpt-disclaimer">This is a digitally verified report and does not require any signature.</div>
      </div>
      <div style="text-align:right">
        <div class="sig-line">${s.pathologist}</div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════
function loadSettings() {
  const s = getSettings();
  document.getElementById('set-hosp-name').value = s.hospName;
  document.getElementById('set-dept-name').value = s.deptName;
  document.getElementById('set-address').value = s.address;
  document.getElementById('set-tel').value = s.tel;
  document.getElementById('set-pathologist').value = s.pathologist;
}

function saveSettings() {
  const s = {
    hospName: document.getElementById('set-hosp-name').value,
    deptName: document.getElementById('set-dept-name').value,
    address: document.getElementById('set-address').value,
    tel: document.getElementById('set-tel').value,
    pathologist: document.getElementById('set-pathologist').value,
  };
  localStorage.setItem('msh_settings', JSON.stringify(s));
  alert('✅ Settings saved!');
}

function clearAllReports() {
  if(!confirm('Delete ALL reports? This cannot be undone.')) return;
  localStorage.removeItem('msh_reports');
  renderDashboard();
  renderReportsList();
  alert('All reports cleared.');
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderDashboard();
</script>
</body>
</html>
